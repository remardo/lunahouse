name: Deploy to Coolify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -fsSL -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://coolify.sorokintech.ru/api/v1/deploy?uuid=tdo6evfisfsp1fa5ugx67if8&force=false"
